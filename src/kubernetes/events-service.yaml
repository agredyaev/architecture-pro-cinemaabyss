apiVersion: apps/v1
kind: Deployment
metadata:
  name: events-service
  namespace: cinemaabyss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: events-service
  template:
    metadata:
      labels:
        app: events-service
    spec:
      containers:
      - name: events-service
        image: ghcr.io/agredyaev/architecture-pro-cinemaabyss/events-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: cinemaabyss-config
              key: EVENTS_SERVICE_PORT
        - name: KAFKA_BROKER
          valueFrom:
            configMapKeyRef:
              name: cinemaabyss-config
              key: KAFKA_BROKER
      imagePullSecrets:
      - name: dockerconfigjson

---
apiVersion: v1
kind: Service
metadata:
  name: events-service
  namespace: cinemaabyss
spec:
  selector:
    app: events-service
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082