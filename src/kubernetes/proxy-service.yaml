apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy-service
  namespace: cinemaabyss
spec:
  replicas: 1
  selector:
    matchLabels:
      app: proxy-service
  template:
    metadata:
      labels:
        app: proxy-service
    spec:
      containers:
      - name: proxy-service
        image: ghcr.io/agredyaev/architecture-pro-cinemaabyss/proxy-service:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PROXY_SERVICE_PORT
        - name: MONOLITH_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MONOLITH_URL
        - name: MOVIES_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MOVIES_SERVICE_URL
        - name: EVENTS_SERVICE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: EVENTS_SERVICE_URL
        - name: GRADUAL_MIGRATION
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: GRADUAL_MIGRATION
        - name: MOVIES_MIGRATION_PERCENT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: MOVIES_MIGRATION_PERCENT
      imagePullSecrets:
      - name: dockerconfigsecret

---
apiVersion: v1
kind: Service
metadata:
  name: proxy-service
  namespace: cinemaabyss
spec:
  selector:
    app: proxy-service
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000