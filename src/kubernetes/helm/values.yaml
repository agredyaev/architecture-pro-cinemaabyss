# Global settings
global:
  namespace: cinemaabyss
  domain: cinemaabyss.example.com
  image:
    registry: ghcr.io/agredyaev/architecture-pro-cinemaabyss

# Image pull secrets
imagePullSecrets:
  name: dockerconfigjson
  username: agredyaev
  password: "" # Enter your PAT here

# Database configuration
database:
  host: postgres
  port: 5432
  name: cinemaabyss
  user: postgres
  password: postgres
  image:
    repository: postgres
    tag: 14
    pullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 512Mi
  persistence:
    enabled: true
    size: 10Gi
    accessMode: ReadWriteOnce

# Application services configuration
services:
  monolith:
    name: monolith
    enabled: true
    image:
      repository: monolith
      tag: latest
      pullPolicy: Always
    replicas: 1
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      port: 8080
      targetPort: 8080
      type: ClusterIP
    env:
      PORT: "8080"
      DB_CONNECTION_STRING: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable"

  proxy:
    name: proxy-service
    enabled: true
    image:
      repository: proxy-service
      tag: latest
      pullPolicy: Always
    replicas: 1
    resources:
      limits:
        cpu: 300m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      port: 80
      targetPort: 8000
      type: ClusterIP
    env:
      PORT: "8000"
      MONOLITH_URL:
        configMapKeyRef:
          name: '{{ .Release.Name }}-config'
          key: MONOLITH_URL
      MOVIES_SERVICE_URL:
        configMapKeyRef:
          name: '{{ .Release.Name }}-config'
          key: MOVIES_SERVICE_URL
      EVENTS_SERVICE_URL:
        configMapKeyRef:
          name: '{{ .Release.Name }}-config'
          key: EVENTS_SERVICE_URL
      GRADUAL_MIGRATION:
        configMapKeyRef:
          name: '{{ .Release.Name }}-config'
          key: GRADUAL_MIGRATION
      MOVIES_MIGRATION_PERCENT:
        configMapKeyRef:
          name: '{{ .Release.Name }}-config'
          key: MOVIES_MIGRATION_PERCENT

  movies:
    name: movies-service
    enabled: true
    image:
      repository: movies-service
      tag: latest
      pullPolicy: Always
    replicas: 1
    resources:
      limits:
        cpu: 300m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      port: 8081
      targetPort: 8081
      type: ClusterIP
    env:
      PORT: "8081"
      DB_CONNECTION_STRING: "postgres://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=disable"

  events:
    name: events-service
    enabled: true
    image:
      repository: events-service
      tag: latest
      pullPolicy: Always
    replicas: 1
    resources:
      limits:
        cpu: 300m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
    service:
      port: 8082
      targetPort: 8082
      type: ClusterIP
    env:
      PORT: "8082"

# Kafka configuration
kafka:
  enabled: true
  broker: "kafka:9092"
  image:
    repository: wurstmeister/kafka
    tag: 2.13-2.7.0
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 512Mi
  persistence:
    enabled: true
    size: 5Gi
    accessMode: ReadWriteOnce
  topics:
    - name: movie-events
      partitions: 1
      replicationFactor: 1
    - name: user-events
      partitions: 1
      replicationFactor: 1
    - name: payment-events
      partitions: 1
      replicationFactor: 1

# Zookeeper configuration
zookeeper:
  enabled: true
  image:
    repository: wurstmeister/zookeeper
    tag: latest
    pullPolicy: IfNotPresent
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  persistence:
    enabled: true
    size: 1Gi
    accessMode: ReadWriteOnce

# Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
  hosts:
    - host: cinemaabyss.example.com
      paths:
        - path: /
          pathType: Prefix
          service: proxy-service
          port: 80
        - path: /api/events
          pathType: Prefix
          service: events-service
          port: 8082

# Application configuration
config:
  # Strangler Fig configuration
  gradualMigration: "true"
  moviesMigrationPercent: "100"
